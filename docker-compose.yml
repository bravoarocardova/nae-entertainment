version: '3.8'

services:
  backend:
    build:
      context: ./be
    container_name: nae-backend
    ports:
      - "4000:4000"
    volumes:
      - ./be/music.db:/app/music.db
      - ./be/public:/app/public
    env_file:
      - ./be/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./fe
    container_name: nae-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
